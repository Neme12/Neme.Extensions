name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os-name }}, ${{ matrix.configuration }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        configuration: [Debug, Release]
        include:
          - os: windows-latest
            os-name: Windows
          - os: ubuntu-latest
            os-name: Linux
          - os: macos-latest
            os-name: macOS

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup .NET 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Build
      run: dotnet build --configuration ${{ matrix.configuration }}

    - name: Test .NET 10
      run: dotnet test --framework net10.0 --no-build --configuration ${{ matrix.configuration }} --logger "trx;LogFileName=test-results-net10.trx"

    - name: Test .NET 8
      run: dotnet test --framework net8.0 --no-build --configuration ${{ matrix.configuration }} --logger "trx;LogFileName=test-results-net8.trx"

    - name: Test .NET 6
      run: dotnet test --framework net6.0 --no-build --configuration ${{ matrix.configuration }} --logger "trx;LogFileName=test-results-net6.trx"

    - name: Test .NET Framework 4.8 (Windows only)
      if: runner.os == 'Windows'
      run: dotnet test --framework net48 --no-build --configuration ${{ matrix.configuration }} --logger "trx;LogFileName=test-results-net48.trx"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.configuration }}
        path: '**/TestResults/*.trx'

  package:
    name: Package (Release)
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Pack
      run: |
        DATE=$(date +'%Y%m%d')
        dotnet pack Neme.Extensions.slnx \
          --configuration Release \
          --version-suffix "CI-${DATE}.${{ github.run_number }}" \
          --output "./artifacts"

    - name: Push to GitHub Packages
      run: |
        dotnet nuget push "./artifacts/*.nupkg" \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --skip-duplicate

    - name: Upload package artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages-release
        path: ./artifacts/*.nupkg

  debug-package:
    name: Package (Debug)
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Pack
      run: |
        DATE=$(date +'%Y%m%d')
        dotnet pack Neme.Extensions.slnx \
          --configuration Debug \
          --version-suffix "CI-${DATE}.${{ github.run_number }}.debug" \
          --output "./artifacts"

    - name: Push to GitHub Packages
      run: |
        dotnet nuget push "./artifacts/*.nupkg" \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --skip-duplicate

    - name: Upload package artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages-debug
        path: ./artifacts/*.nupkg
